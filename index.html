<!DOCTYPE html>
<html>
<head>
    <title>Google Drive Folder Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Google Drive Folder Downloader</h1>

    <input
        id="folderUrl"
        type="text"
        placeholder="Paste Google Drive Folder URL"
    >

    <button onclick="downloadFolder()">
        Download Folder
    </button>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
